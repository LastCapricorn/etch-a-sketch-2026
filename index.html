<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/lc_dark_green.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./css/style.css">
  <script defer src="./js/script.js"></script>
  <title>Etch-A-Sketch</title>
</head>
<body>
  <header>
    <div id="lc-title">
      <img src="./images/lc_dark_green.svg" alt="Last Capricorn Logo" id="logo" width="56">
      <h1>Etch - A - Sketch</h1>
    </div>
    <div id="theme">
      <button id="theme-toggle" type="button">&#9775;</button>
    </div>
  </header>
  <main>
    <div id="sketch-board"></div>
    <div id="settings-panel">
      <div id="change-size">
        <button class="settings" id="grid-minus" type="button">&#11206;</button>
        <span id="grid-size">16 x 16</span>
        <button class="settings" id="grid-plus" type="button">&#11205;</button>
      </div>
      <button class="settings" id="grid-reset" type="button">reset</button>
      <button class="settings active" id="grid-toggler" type="button">grid</button>
      <button class="settings active" id="black-white" type="button">black</button>
      <button class="settings" id="random-colors" type="button">random</button>
      <button class="settings" id="grayscale" type="button">grayscale</button>
      <button class="settings" id="darken" type="button">darken</button>
      <button class="settings" id="brighten" type="button">brighten</button>
      <button class="settings" id="rainbow" type="button">rainbow</button>
      <button class="settings" id="fire" type="button">fire</button>
      <button class="settings" id="ice" type="button">ice</button>
    </div>
  </main>
  <footer>
    <p>&copy; LastCapricorn 2026</p>
    <ul>
      <li><a href="https://www.theodinproject.com">odin</a></li>
      <li><a href="https://www.github.com">github</a></li>
    </ul>
  </footer>
</body>
</html>
